name: Wii Homebrew Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install devkitPro toolchain
        run: |
          wget https://apt.devkitpro.org/install-devkitpro-pacman
          chmod +x install-devkitpro-pacman
          sudo ./install-devkitpro-pacman
          sudo dkp-pacman -S --noconfirm devkitPPC libogc
          
      - name: Build Wii Homebrew
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITPPC=$DEVKITPRO/devkitPPC
          make

      - name: Package Homebrew App Structure
        run: |
          mkdir -p dist/apps/WiiBrowserLite
          cp meta.xml dist/apps/WiiBrowserLite/meta.xml
          cp icon.png dist/apps/WiiBrowserLite/icon.png
          cp *.dol dist/apps/WiiBrowserLite/boot.dol
          cd dist && zip -r WiiBrowserLite.zip apps

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Wii-Homebrew-Build
          path: dist/WiiBrowserLite.zip
