name: Build WiiBrowser-Lite

on:
  push:
    branches: [ main, claude/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------
  # Host smoke tests - fast feedback before paying for a Wii cross-build
  # -------------------------------------------------------------------
  host-smoke:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache third_party host builds
      # Host-side third_party objects depend only on the submodule HEADs
      # and the patch stack. Rekey cache on those so a branch push that
      # doesn't touch deps reuses the existing .a files.
      uses: actions/cache@v4
      with:
        key: host-thirdparty-${{ hashFiles('.gitmodules', 'third_party/*-patches/*.patch', 'include/wbl/mbedtls_config.h', 'third_party/*.mk', 'tests/Makefile') }}-${{ hashFiles('.git/modules/third_party/**/HEAD') }}
        restore-keys: |
          host-thirdparty-
        path: |
          third_party/mbedtls/library/*.a
          third_party/mbedtls/library/*.o
          third_party/curl/lib/.libs/*.a
          third_party/curl/lib/*.lo
          third_party/curl/config.status
          third_party/curl/config.log
          third_party/curl/Makefile
          third_party/quickjs/libquickjs.a
          third_party/quickjs/*.o

    - name: Install host build deps
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config \
            perl python3 zlib1g-dev

    - name: Report toolchain
      run: |
        set -x
        gcc --version | head -1
        which gcc-ar gcc-ranlib
        ls -la third_party/ tests/
        ls -la third_party/mbedtls-wbl-config/wbl/ || true
        git submodule status

    - name: Build + run host smoke tests
      run: |
        set -x
        cd tests
        make -j$(nproc) 2>&1 | tee ../host-smoke.log
        echo "smoke tests pass: $?"

    - name: Upload host smoke test log (for debugging failures)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: host-smoke-log
        path: host-smoke.log
        retention-days: 7
        if-no-files-found: warn

    - name: Verify LTO bitcode in all third-party archives
      run: tests/lto_check.sh

  # -------------------------------------------------------------------
  # Wii PowerPC cross-compile - only runs if host-smoke passes
  # -------------------------------------------------------------------
  build:
    needs: host-smoke
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Verify devkitPPC environment
      run: |
        echo "DEVKITPRO=$DEVKITPRO"
        echo "DEVKITPPC=$DEVKITPPC"
        export PATH=$DEVKITPPC/bin:$DEVKITPRO/tools/bin:$PATH
        powerpc-eabi-gcc --version
        ls -la $DEVKITPRO

    - name: Install build dependencies for third_party
      run: |
        # Needed by curl autoreconf and mbedTLS make
        apt-get update -qq && apt-get install -y --no-install-recommends \
          autoconf automake libtool pkg-config python3 perl xxd \
          coreutils
        # numfmt is in coreutils; no separate package

    - name: Report toolchain
      continue-on-error: true
      env:
        PATH: /opt/devkitpro/devkitPPC/bin:/opt/devkitpro/tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      run: |
        set -x
        powerpc-eabi-gcc --version | head -1
        # gcc-ar/gcc-ranlib needed for LTO across static archives
        which powerpc-eabi-gcc-ar powerpc-eabi-gcc-ranlib || \
            echo "WARNING: powerpc-eabi-gcc-ar/ranlib missing; LTO cross-archive may degrade"
        ls -la $DEVKITPPC/bin/ | head -30
        ls -la third_party/
        git submodule status

    # Cache the Wii cross-built third_party libraries. Key includes both
    # the submodule pinned hash AND the patch stack + config so any change
    # to our patches, mbedtls config, or third_party build scripts
    # invalidates the cache automatically.
    - name: Cache third_party Wii builds
      uses: actions/cache@v4
      with:
        key: wii-thirdparty-${{ hashFiles('.gitmodules', 'third_party/*-patches/*.patch', 'include/wbl/mbedtls_config.h', 'third_party/*.mk', 'platform/wii/build.mk') }}-${{ hashFiles('.git/modules/third_party/**/HEAD') }}
        restore-keys: |
          wii-thirdparty-
        path: |
          third_party/mbedtls/library/*.a
          third_party/mbedtls/library/*.o
          third_party/curl/lib/.libs/*.a
          third_party/curl/lib/*.lo
          third_party/curl/config.status
          third_party/curl/config.log
          third_party/curl/Makefile
          third_party/quickjs/.wbl-patches-applied
          build/libquickjs.a
          build/quickjs/*.o

    - name: Build WiiBrowser-Lite (Wii, PowerPC, -flto)
      env:
        PATH: /opt/devkitpro/devkitPPC/bin:/opt/devkitpro/tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      run: |
        set -x
        make WBL_PLATFORM=wii -j$(nproc) 2>&1 | tee wii-build.log
        exit ${PIPESTATUS[0]}

    - name: Upload Wii build log (for debugging failures)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: wii-build-log
        path: wii-build.log
        retention-days: 7
        if-no-files-found: warn

    - name: Push build log to failure-logs branch (so Claude Code can read it)
      if: failure()
      env:
        TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # When the build fails, push wii-build.log to a branch named
        # ci-log/<short-sha> so it's visible via git (bypasses auth).
        SHA="${GITHUB_SHA:0:7}"
        LOGBR="ci-log/wii-${SHA}"
        git config user.name  "ci-log-bot"
        git config user.email "ci-log@noreply.local"
        mkdir -p .ci-log
        cp wii-build.log .ci-log/ 2>/dev/null || echo "(no log)" > .ci-log/wii-build.log
        {
          echo "# Wii build failure log"
          echo "- SHA: $GITHUB_SHA"
          echo "- Run URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          echo ""
          echo '## errors grep'
          echo '```'
          grep -E 'error:|undefined reference|fatal error|No such file|Error [0-9]|make.*Error|cannot find|not found' wii-build.log | head -60
          echo '```'
        } > .ci-log/SUMMARY.md
        git checkout --orphan "$LOGBR"
        git rm -rf --cached . || true
        git clean -fdx -e .ci-log || true
        git add .ci-log/
        git commit -m "CI log for ${SHA}" || true
        git push -f "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            HEAD:refs/heads/"$LOGBR" || true

    - name: Dump build log on failure (so error shows in CI output)
      if: failure()
      run: |
        {
          echo '## Wii build failure'
          echo ''
          echo '### errors grep'
          echo '```'
          grep -E 'error:|undefined reference|fatal error|No such file|Error [0-9]|make.*Error' wii-build.log | head -50 || echo "(nothing matched)"
          echo '```'
          echo ''
          echo '### wii-build.log (last 150 lines)'
          echo '```'
          tail -150 wii-build.log || true
          echo '```'
          echo ''
          echo '### artifact presence'
          echo '```'
          echo "third_party/curl:"
          ls -la third_party/curl/lib/.libs/*.a 2>&1 || echo "  (none)"
          echo "third_party/mbedtls:"
          ls -la third_party/mbedtls/library/*.a 2>&1 || echo "  (none)"
          echo "build/libquickjs.a:"
          ls -la build/libquickjs.a 2>&1 || echo "  (none)"
          echo "build/wii:"
          ls -la build/wii 2>&1 | head -20 || echo "  (none)"
          echo '```'
        } | tee -a "$GITHUB_STEP_SUMMARY"
        # Also echo to stdout for webhook consumers
        cat "$GITHUB_STEP_SUMMARY"

    - name: Verify build artifacts exist
      run: |
        ls -lh wiibrowserlite.dol wiibrowserlite.elf
        file wiibrowserlite.dol wiibrowserlite.elf

    - name: Validate .dol binary (PPC objdump + section sanity)
      env:
        PATH: /opt/devkitpro/devkitPPC/bin:/opt/devkitpro/tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      run: |
        scripts/verify-dol.sh wiibrowserlite.dol wiibrowserlite.elf

    - name: Report binary section breakdown
      env:
        PATH: /opt/devkitpro/devkitPPC/bin:/opt/devkitpro/tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      run: |
        echo "=== Section sizes ==="
        powerpc-eabi-size wiibrowserlite.elf
        echo ""
        echo "=== ELF section headers ==="
        powerpc-eabi-objdump -h wiibrowserlite.elf | head -30
        echo ""
        echo "=== Top 20 largest symbols ==="
        powerpc-eabi-nm --size-sort -S wiibrowserlite.elf 2>/dev/null | tail -20

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wiibrowser-lite-build
        path: |
          wiibrowserlite.dol
          wiibrowserlite.elf
          wiibrowserlite.map
        retention-days: 30

    - name: Upload .dol for release
      uses: actions/upload-artifact@v4
      with:
        name: wiibrowserlite.dol
        path: wiibrowserlite.dol
        retention-days: 90
