name: Build WiiBrowser-Lite

on:
  push:
    branches: [ main, claude/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Host smoke tests run first - they catch TLS/JS/curl integration bugs
  # in seconds without the cost of a Wii cross-build.
  host-smoke:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install host build deps
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config \
            perl python3 zlib1g-dev

    - name: Build + run host smoke tests
      run: |
        cd tests
        make -j$(nproc)

    - name: Verify LTO bitcode in all third-party archives
      run: tests/lto_check.sh

  # Wii build runs in the devkitPPC container. Only runs if host-smoke
  # passes - no point paying for a cross-compile if the config has bugs.
  build:
    needs: host-smoke
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Verify devkitPPC environment
      run: |
        echo "DEVKITPRO=$DEVKITPRO"
        echo "DEVKITPPC=$DEVKITPPC"
        export PATH=$DEVKITPPC/bin:$DEVKITPRO/tools/bin:$PATH
        powerpc-eabi-gcc --version
        ls -la $DEVKITPRO

    - name: Install build dependencies for third_party
      run: |
        # Needed by curl autoreconf and mbedTLS make
        apt-get update -qq && apt-get install -y --no-install-recommends \
          autoconf automake libtool pkg-config python3 perl

    - name: Clean build directory
      run: make distclean WBL_PLATFORM=wii || make clean WBL_PLATFORM=wii || true

    - name: Build WiiBrowser-Lite (Wii, PowerPC, -flto)
      env:
        PATH: /opt/devkitpro/devkitPPC/bin:/opt/devkitpro/tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      run: |
        make WBL_PLATFORM=wii -j$(nproc)

    - name: Verify build artifacts
      run: |
        ls -lh wiibrowserlite.dol wiibrowserlite.elf
        file wiibrowserlite.dol wiibrowserlite.elf
        echo "Binary size:"
        du -h wiibrowserlite.dol

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wiibrowser-lite-build
        path: |
          wiibrowserlite.dol
          wiibrowserlite.elf
          wiibrowserlite.map
        retention-days: 30

    - name: Upload .dol for release
      uses: actions/upload-artifact@v4
      with:
        name: wiibrowserlite.dol
        path: wiibrowserlite.dol
        retention-days: 90
