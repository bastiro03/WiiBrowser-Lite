name: Wii Build
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Install DevkitPro Portlibs
        run: |
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --needed --noconfirm \
            wii-freetype \
            wii-libjpeg-turbo \
            wii-libpng \
            wii-zlib \
            wii-curl \
            wii-lua \
            wii-mxml \
            wii-libiconv
      - name: Build Main Application
        run: |
          make
      - name: Build Forwarder Channel
        run: |
          make -C forwarder
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: WiiBrowser-Build
          path: |
            *.dol
            *.elf
            forwarder/*.dol
            forwarder/*.elf